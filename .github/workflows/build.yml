name: Build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      part:
        description: HC32F460 part number, or all for compatibility check
        required: true
        default: HC32F460KEUA
        type: choice
        options:
          - all
          - HC32F460JCTA
          - HC32F460JETA
          - HC32F460JEUA
          - HC32F460KCTA
          - HC32F460KETA
          - HC32F460KEUA
          - HC32F460PCTB
          - HC32F460PEHB
          - HC32F460PETB
      build_type:
        description: CMake build type
        required: true
        default: Debug
        type: choice
        options:
          - Debug
          - Release
          - RelWithDebInfo
          - MinSizeRel
      float_abi:
        description: Floating-point ABI
        required: true
        default: hard
        type: choice
        options:
          - hard
          - softfp
          - soft
      upload_artifacts:
        description: Upload firmware artifacts
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  HC32_CI_PART: ${{ vars.HC32_CI_PART || 'HC32F460KEUA' }}
  HC32_CI_FLOAT_ABI: ${{ vars.HC32_CI_FLOAT_ABI || 'hard' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-build:
    name: CI ${{ matrix.build_type }}
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version

      - name: Configure
        run: |
          cmake -S . -B "build/${HC32_CI_PART}-${{ matrix.build_type }}" \
            -G Ninja \
            --toolchain cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DHC32_PART="${HC32_CI_PART}" \
            -DHC32_FLOAT_ABI="${HC32_CI_FLOAT_ABI}"

      - name: Build
        run: cmake --build "build/${HC32_CI_PART}-${{ matrix.build_type }}" --parallel

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.HC32_CI_PART }}-${{ matrix.build_type }}
          path: build/${{ env.HC32_CI_PART }}-${{ matrix.build_type }}/firmware/*
          if-no-files-found: error
          retention-days: 14

  manual-build:
    name: ${{ inputs.part }} ${{ inputs.build_type }} ${{ inputs.float_abi }}
    if: github.event_name == 'workflow_dispatch' && inputs.part != 'all'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version

      - name: Configure
        run: |
          cmake -S . -B "build/${{ inputs.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}" \
            -G Ninja \
            --toolchain cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DHC32_PART=${{ inputs.part }} \
            -DHC32_FLOAT_ABI=${{ inputs.float_abi }}

      - name: Build
        run: cmake --build "build/${{ inputs.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}" --parallel

      - name: Upload firmware
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}
          path: build/${{ inputs.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}/firmware/*
          if-no-files-found: error
          retention-days: 14

  manual-all-build:
    name: ${{ matrix.part }} ${{ inputs.build_type }} ${{ inputs.float_abi }}
    if: github.event_name == 'workflow_dispatch' && inputs.part == 'all'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        part:
          - HC32F460JCTA
          - HC32F460JETA
          - HC32F460JEUA
          - HC32F460KCTA
          - HC32F460KETA
          - HC32F460KEUA
          - HC32F460PCTB
          - HC32F460PEHB
          - HC32F460PETB

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libnewlib-arm-none-eabi
          cmake --version
          ninja --version
          arm-none-eabi-gcc --version

      - name: Configure
        run: |
          cmake -S . -B "build/${{ matrix.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}" \
            -G Ninja \
            --toolchain cmake/gcc-arm-none-eabi.cmake \
            -DCMAKE_BUILD_TYPE=${{ inputs.build_type }} \
            -DHC32_PART=${{ matrix.part }} \
            -DHC32_FLOAT_ABI=${{ inputs.float_abi }}

      - name: Build
        run: cmake --build "build/${{ matrix.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}" --parallel

      - name: Upload firmware
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}
          path: build/${{ matrix.part }}-${{ inputs.build_type }}-${{ inputs.float_abi }}/firmware/*
          if-no-files-found: error
          retention-days: 14
